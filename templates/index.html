<!DOCTYPE html>
<html>
<head>
    <title>Cognitive Load Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa;">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary mb-4">Cognitive Load Monitoring Dashboard</h2>

        <form action="/predict" method="POST">
            <div class="row">
                {% for f in features %}
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">{{f}}</label>
                    <input type="number" step="any" name="{{f}}" class="form-control" required>
                </div>
                {% endfor %}
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">
                    Analyze Stress Level
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
